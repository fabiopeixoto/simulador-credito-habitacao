// ── Helpers matemáticos ───────────────────────────────────────────────────
const fE  = v => v.toLocaleString("pt-PT",{style:"currency",currency:"EUR",maximumFractionDigits:0});
const fE2 = v => v.toLocaleString("pt-PT",{style:"currency",currency:"EUR",minimumFractionDigits:2,maximumFractionDigits:2});
const fP  = v => v.toFixed(3).replace(".",",") + "%";
const fP1 = v => v.toFixed(1).replace(".",",") + "%";

function calcP(C,tanA,anos) {
  const r=tanA/100/12, n=anos*12;
  if(r===0||n===0) return n>0?C/n:0;
  return C*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
}

// ── TAEG — Taxa Anual de Encargos Efectiva Global ─────────────────────────
// Fórmula EU Directiva 2014/17/UE (transposta DL 74-A/2017):
// Capital = comIniciais_t0 + Σ(encargo_mensal / (1+r)^t, t=1..n)
// onde r = TAEG/12 (taxa mensal). Resolve por bissecção.
function calcTAEG(capital, comIniciais, encargo_mensal, n) {
  if(!capital||!encargo_mensal||!n) return 0;
  // Se encargo_mensal * n <= capital + comIniciais → taxa negativa, devolver 0
  if(encargo_mensal * n <= capital) return 0;
  let lo=0.00001, hi=0.05; // taxa mensal entre 0 e 5%
  for(let i=0;i<200;i++){
    const mid=(lo+hi)/2;
    const pv=encargo_mensal*(1-Math.pow(1+mid,-n))/mid;
    if(pv + comIniciais > capital) lo=mid;
    else hi=mid;
  }
  return Math.round((lo+hi)/2*12*10000)/100; // TAEG % com 2 decimais
}

// ── MTIC — Montante Total Imputado ao Consumidor ─────────────────────────
// Tudo o que o cliente paga ao longo da vida do crédito
function calcMTIC(comIniciais, encargo_mensal, n) {
  return Math.round(comIniciais + encargo_mensal * n);
}

// ── IS sobre juros — isenção HPP, decrescente para arrendamento ───────────
// Para HPP: IS = €0 (art. 7º CIS)
// Para arrendamento: IS mensal médio = média dos juros mensais × 4%
// Usando total de juros / n para aproximação do IS médio mensal
function isJurosMedioMensal(capital, tanA, anos, finalidade) {
  if(!finalidade||finalidade==="hpp"||finalidade==="hab2") return 0;
  if(finalidade==="arrendamento"){
    const r=tanA/100/12, n=anos*12;
    if(r===0) return 0;
    const P=calcP(capital,tanA,anos);
    const totalJuros=Math.max(0, P*n - capital);
    return (totalJuros/n)*0.04; // IS médio mensal (decrescente ao longo do prazo)
  }
  return 0;
}

function vidaR(a){
  if(a<=25)return 0.0012; if(a<=30)return 0.0015; if(a<=35)return 0.0020;
  if(a<=40)return 0.0028; if(a<=45)return 0.0040; if(a<=50)return 0.0060;

function capMedioFator(anos) {

// ── Produto misto com período promocional correcto ────────────────────────
// Calcula: PMT durante promo (P1), saldo residual após promo, PMT pós-promo (P2)
function calcPromo(capital, tanPromo, tanNormal, mesesPromo, prazoTotal) {
  if(!mesesPromo||tanPromo===null) return null;
  const mTotal=prazoTotal*12;
  // Prestação durante promo: calculada para o prazo total completo à taxa promo
  const pmtP1=calcP(capital, tanPromo, prazoTotal);
  // Saldo residual após mesesPromo prestações
  const rP=tanPromo/100/12;
  let saldo=capital;
  for(let m=0;m<Math.min(mesesPromo,mTotal);m++){
    const juros=saldo*rP;
    saldo=Math.max(0, saldo-(pmtP1-juros));
  }
  const mRestantes=mTotal-mesesPromo;
  // Prestação pós-promo sobre o saldo residual
  const pmtP2=mRestantes>0?calcP(saldo, tanNormal, mRestantes/12):0;
  return {pmtP1:Math.round(pmtP1*100)/100, pmtP2:Math.round(pmtP2*100)/100, saldoAposProm:Math.round(saldo), mPromo:mesesPromo, mNorm:mRestantes};
}

function calcIMT(v,j,finalidade) {
  if(finalidade!=="hpp") return v*0.06; // 2.ª hab.: taxa fixa 6%
  if(j&&v<=316772)return 0;
  if(v<=97064)return 0; if(v<=132774)return v*0.02-1941.28;
  if(v<=181034)return v*0.05-5924.50; if(v<=301688)return v*0.07-9545.18;
  if(v<=603289)return v*0.08-12562.06; return v*0.06;
}

function simA(C,tanA,anos,extra) {
  const r=tanA/100/12, P=calcP(C,tanA,anos);
  let s=C,j=0,m=0;
  while(s>0.01&&m<anos*12){const ji=s*r;j+=ji;s-=(P-ji);m++;if(extra>0&&m%12===0)s=Math.max(0,s-extra);}
  return{meses:m,juros:j,economia:Math.max(0,P*anos*12-C-j),poupados:anos*12-m};
}
function amChart(C,tanA,anos,extra) {
  const r=tanA/100/12, P=calcP(C,tanA,anos);
  let s1=C,s2=C; const d=[{ano:0,"Com amort.":C,"Sem amort.":C}];
  for(let m=1;m<=anos*12;m++){
    s1=Math.max(0,s1-(P-s1*r)); s2=Math.max(0,s2-(P-s2*r));
    if(extra>0&&m%12===0)s1=Math.max(0,s1-extra);
    if(m%12===0)d.push({ano:m/12,"Com amort.":Math.round(s1),"Sem amort.":Math.round(s2)});
  }
  return d;
}

async function fetchEuriborBCE() {
  const ECB_BASE = "https://data-api.ecb.europa.eu/service/data/FM/";
  const SERIES = {
    "3m":  "M.U2.EUR.RT.MM.EURIBOR3MD_.HSTA",
    "6m":  "M.U2.EUR.RT.MM.EURIBOR6MD_.HSTA",
    "12m": "M.U2.EUR.RT.MM.EURIBOR1YD_.HSTA"
  };
  const MESES = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  function parseCSV(csv) {
    const lines = csv.trim().split("\n").filter(l=>l.trim());
    if(lines.length < 2) throw new Error("CSV vazio");
    const headers = lines[0].split(",").map(h=>h.trim().replace(/"/g,""));
    const dateIdx = headers.indexOf("TIME_PERIOD");
    const valIdx  = headers.indexOf("OBS_VALUE");
    if(dateIdx<0||valIdx<0) throw new Error("Colunas não encontradas");
    const cols = lines[lines.length-1].split(",").map(c=>c.trim().replace(/"/g,""));
    const val  = parseFloat(cols[valIdx]);
    const date = cols[dateIdx]||"";
    if(isNaN(val)) throw new Error("Valor inválido");
    return {val, date};
  }
  const eur = {};
  let dataLabel = "";
  await Promise.all(Object.entries(SERIES).map(async([key, series])=>{
    const r = await fetch(ECB_BASE+series+"?format=csvdata&lastNObservations=1");
    if(!r.ok) throw new Error("BCE "+key+" HTTP "+r.status);
    const {val, date} = parseCSV(await r.text());
    eur[key] = val;
    if(!dataLabel && date) {
      const [y,m] = date.split("-");
      dataLabel = (MESES[parseInt(m,10)-1]||m)+". "+y;
    }
  }));
  return {eur, dataLabel};
}

async function fetchSpreadsAnthropic(apiKey) {

  const prompt = "Dados actuais de "+hoje+". Qual é o spread mínimo de crédito habitação HPP (1.ª habitação) com produtos associados (domiciliação + seguros vida e multirriscos) para cada banco português: CA (Crédito Agrícola), CTT, Bankinter, Abanca, BCP (Millennium), ActivoBank, BPI, Montepio, Santander, NovoBanco, CGD (Caixa), UCI, BIC, BNI? Responde APENAS com JSON puro (sem texto, sem markdown, sem explicações): {\"CA\":{\"sCom\":0.65,\"sSem\":1.65},\"CTT\":{\"sCom\":0.70,\"sSem\":1.30},\"BNKTR\":{\"sCom\":0.70,\"sSem\":1.05},\"ABANCA\":{\"sCom\":0.70,\"sSem\":1.70},\"BCP\":{\"sCom\":0.70,\"sSem\":1.25},\"ACTVO\":{\"sCom\":0.75,\"sSem\":1.50},\"BPI\":{\"sCom\":0.75,\"sSem\":1.50},\"MNTPO\":{\"sCom\":0.70,\"sSem\":1.50},\"SANTR\":{\"sCom\":0.80,\"sSem\":1.90},\"NB\":{\"sCom\":0.80,\"sSem\":1.50},\"CGD\":{\"sCom\":0.85,\"sSem\":1.35},\"UCI\":{\"sCom\":0.85,\"sSem\":1.30},\"BIC\":{\"sCom\":1.00,\"sSem\":1.50},\"BNI\":{\"sCom\":1.00,\"sSem\":1.50}}";
  const resp = await fetch("/api/spreads",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:prompt})
  });
  if(!resp.ok){
    const errText = await resp.text().catch(()=>"");
    const errJson = (() => { try { return JSON.parse(errText); } catch(_) { return {}; } })();
    const errMsg  = errJson.error?.message || errText.slice(0,120) || "HTTP "+resp.status;
    let errPT;
    if(errMsg.includes("credit balance")||errMsg.includes("insufficient")||errMsg.includes("balance is too low"))
      errPT="Saldo insuficiente — adiciona crédito em console.anthropic.com/settings/billing";
    else if(resp.status===401||errMsg.includes("invalid x-api-key")||errMsg.includes("invalid api key"))
      errPT="Chave API inválida — verifica em console.anthropic.com/settings/keys";
    else if(resp.status===403||errMsg.includes("permission"))
      errPT="Sem permissões — verifica o plano em console.anthropic.com";
    else
      errPT="API "+resp.status+": "+errMsg.slice(0,70);
    throw new Error(errPT);
  }
  const data = await resp.json();
  const txt = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  // Extrair JSON da resposta
  const m = txt.match(/\{[\s\S]*"CA"[\s\S]*\}/);
  if(!m) throw new Error("Formato inválido: "+txt.slice(0,60));
  return JSON.parse(m[0]);
}

async function fetchAllRates(apiKey) {
  const results = {eur:null, spreads:null, eurLabel:"", eurOk:false, sprOk:false, sprErr:""};

    results.eurLabel = dataLabel;
    results.eurOk = true;
  } catch(e) {
