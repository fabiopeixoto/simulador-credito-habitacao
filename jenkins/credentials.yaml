credentials:
  system:
    domainCredentials:
      - domain:
          name: "global"
          description: "Global credentials"
        credentials:
          - string:
              scope: GLOBAL
              id: "admin-token"
              description: "Admin token for the simulador-credito-habitacao application"
              secret: "${ADMIN_TOKEN}"
          - string:
              scope: GLOBAL
              id: "debug-secret"
              description: "Debug secret for the simulador-credito-habitacao application"
              secret: "${DEBUG_SECRET}"
